<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { font-family: Poppins; box-sizing: border-box; }
body { margin:0; background:#eef2f7; }

.container {
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  width:100%;
}

body {
  margin:0;
  background:#eef2f7;
  height:100vh;
}

#authSection {
  width:100%;
}

.card {
  background:white;
  padding:30px;
  width:350px;
  border-radius:10px;
}

input, button {
  width:100%;
  padding:12px;
  margin:8px 0;
}

button {
  background:#007bff;
  color:white;
  border:none;
  cursor:pointer;
}

.link {
  text-align:center;
  font-size:14px;
}

.link a {
  color:#007bff;
  cursor:pointer;
}

.hidden { display:none; }

.dashboard {
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.profile-box {
  background:white;
  padding:25px;
  border-radius:10px;
  max-width:400px;
  width:100%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

img {
  border-radius:8px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="container" id="authSection">
<div class="card">

<div id="loginBox">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <div class="link">
    <a onclick="showForgot()">Forgot Password?</a>
  </div>

  <div class="link">
    No account? <a onclick="showRegister()">Create Account</a>
  </div>
</div>

<div id="registerBox" class="hidden">
  <h2>Create Account</h2>
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input type="file" id="registerImage">
  <button onclick="register()">Register</button>

  <div class="link">
    <a onclick="showLogin()">Back to Login</a>
  </div>
</div>

<div id="forgotBox" class="hidden">
  <h2>Forgot Password</h2>
  <input id="forgotEmail" placeholder="Enter email">
  <button onclick="forgot()">Send Reset Link</button>

  <div class="link">
    <a onclick="showLogin()">Back to Login</a>
  </div>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard hidden" id="appSection">
<div class="profile-box">
<h2>Profile Details</h2>

<p><b>Name:</b></p>
<input id="profileName">

<p><b>Email:</b></p>
<input id="userEmail" disabled>

<p><b>Photo:</b></p>
<img id="profilePic" width="120">
<input type="file" id="profileImage">

<button onclick="updateProfile()">Update</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>
const API = "http://localhost:3000";

/* 🔥 AUTO LOGIN FROM EMAIL LINK */
const urlParams = new URLSearchParams(window.location.search);
const urlToken = urlParams.get("token");

if (urlToken) {
  localStorage.setItem("token", urlToken);
  window.history.replaceState({}, document.title, "/");
}

let token = localStorage.getItem("token");

/* UI SWITCH */
function showRegister(){
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
  forgotBox.classList.add("hidden");
}

function showLogin(){
  loginBox.classList.remove("hidden");
  registerBox.classList.add("hidden");
  forgotBox.classList.add("hidden");
}

function showForgot(){
  loginBox.classList.add("hidden");
  registerBox.classList.add("hidden");
  forgotBox.classList.remove("hidden");
}

/* LOGIN (2FA) */
async function login(){
  const res = await fetch(`${API}/login`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: loginEmail.value,
      password: loginPassword.value
    })
  });

  const data = await res.json();

  if(data.success){
    alert("Check your email to verify login");
  } else {
    alert(data.message);
  }
}

/* REGISTER */
async function register(){
  const form = new FormData();
  form.append("name", name.value);
  form.append("email", email.value);
  form.append("password", password.value);

  if(registerImage.files[0]){
    form.append("profile_pic", registerImage.files[0]);
  }

  const res = await fetch(`${API}/register`, {
    method:"POST",
    body: form
  });

  const data = await res.json();
  alert(data.message);
  showLogin();
}

/* FORGOT */
async function forgot(){
  const res = await fetch(`${API}/forgot-password`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email: forgotEmail.value })
  });

  const data = await res.json();
  alert(data.message);
}

/* PROFILE */
async function loadProfile(){
  const res = await fetch(`${API}/profile-data`, {
    headers:{ Authorization: token }
  });

  const data = await res.json();

  profileName.value = data.name;
  userEmail.value = data.email;

  if(data.profile_pic){
    profilePic.src = `${API}/uploads/${data.profile_pic}?t=${Date.now()}`;
  }
}

/* UPDATE PROFILE */
async function updateProfile(){
  const form = new FormData();
  form.append("name", profileName.value);

  if(profileImage.files[0]){
    form.append("profile_pic", profileImage.files[0]);
  }

  await fetch(`${API}/update-profile`, {
    method:"PUT",
    headers:{ Authorization: token },
    body: form
  });

  alert("Profile updated");
  loadProfile();
}

/*  LOGOUT WITH EMAIL AUTHORIZATION */
async function logout(){
  const res = await fetch(`${API}/logout-request`, {
    method:"POST",
    headers:{ Authorization: token }
  });

  const data = await res.json();
  alert(data.message); // "Check your email to confirm logout"
}

/* SHOW APP */
function showApp(){
  authSection.classList.add("hidden");
  appSection.classList.remove("hidden");
  loadProfile();
}

if(token){
  showApp();
}
</script>

</body>
</html>
